<div class="product-detail-container">
  <div *ngIf="loading" class="loading-container">
    <mat-spinner></mat-spinner>
    <p>Loading product...</p>
  </div>

  <div *ngIf="!loading && product" class="product-detail">
    <div class="product-image">
      <img [src]="getProductImage(product)" [alt]="product.name" (error)="onImageError($event)">
    </div>
    
    <div class="product-info">
      <h1 class="product-name">{{ product.name }}</h1>
      <p class="product-description">{{ product.description }}</p>
      
      <div class="product-price">
        <span class="price">₱{{ product.price | number:'1.2-2' }}</span>
      </div>
      
      <div class="size-selector">
        <h3>Select Size:</h3>
        <div class="size-options">
          <button 
            *ngFor="let variant of product.sizeVariants" 
            mat-button 
            [class.selected]="selectedSize === variant.size"
            [class.out-of-stock]="variant.quantity === 0"
            (click)="selectSize(variant.size)"
            [disabled]="variant.quantity === 0"
            class="size-btn">
            {{ variant.size }}
            <span class="stock-info" *ngIf="variant.quantity > 0">({{ variant.quantity }})</span>
            <span class="stock-info out-of-stock" *ngIf="variant.quantity === 0">(Out of Stock)</span>
          </button>
        </div>
      </div>
      
      <div class="product-stock">
        <mat-chip *ngIf="product.stockQuantity > 0; else outOfStock">
          {{ product.stockQuantity }} in stock
        </mat-chip>
        <ng-template #outOfStock>
          <mat-chip color="warn">Out of stock</mat-chip>
        </ng-template>
      </div>
      
      <div class="product-actions" *ngIf="product.stockQuantity > 0">
        <div class="quantity-selector">
          <button mat-icon-button (click)="decreaseQuantity()" [disabled]="quantity <= 1">
            <mat-icon>remove</mat-icon>
          </button>
          <span class="quantity">{{ quantity }}</span>
          <button mat-icon-button (click)="increaseQuantity()" [disabled]="quantity >= getSelectedSizeQuantity()">
            <mat-icon>add</mat-icon>
          </button>
        </div>
        
        <button mat-raised-button 
                color="primary" 
                (click)="addToCart()"
                [disabled]="!isAuthenticated"
                class="add-to-cart-btn">
          <mat-icon>shopping_cart</mat-icon>
          Add to Cart
        </button>
      </div>
      
      <div class="product-actions" *ngIf="product.stockQuantity === 0">
        <button mat-raised-button disabled class="add-to-cart-btn">
          <mat-icon>shopping_cart</mat-icon>
          Out of Stock
        </button>
      </div>
    </div>
  </div>

  <div *ngIf="!loading && !product" class="no-product">
    <mat-icon>inventory_2</mat-icon>
    <h3>Product not found</h3>
    <p>The product you're looking for doesn't exist.</p>
    <button mat-raised-button color="primary" routerLink="/products">
      <mat-icon>store</mat-icon>
      Browse Products
    </button>
  </div>
</div>
