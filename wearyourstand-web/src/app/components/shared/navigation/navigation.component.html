<!-- Navigation Bar -->
<nav class="navbar">
  <div class="nav-container">
    <div class="nav-brand">
      <h2 routerLink="/home">Wear Your <span class="stand-text">Stand</span></h2>
    </div>
    <div class="nav-links">
      <a routerLink="/home" class="nav-link" routerLinkActive="active">Home</a>
      <a routerLink="/products" class="nav-link" routerLinkActive="active">Products</a>
      
      <!-- Guest Navigation -->
      <ng-container *ngIf="!authService.isLoggedIn()">
        <a routerLink="/login" class="nav-link" routerLinkActive="active">Login</a>
      </ng-container>
      
      <!-- Authenticated Navigation -->
      <ng-container *ngIf="authService.isLoggedIn()">
        <a routerLink="/orders" class="nav-link" routerLinkActive="active">My Orders</a>
        <div class="user-menu-container">
          <button mat-icon-button class="user-menu-button" type="button" (click)="toggleUserMenu()">
            <i class="fas fa-user-circle"></i>
          </button>
          <div class="user-dropdown" [class.show]="showUserMenu">
            <div class="user-info">
              <p class="user-name">{{ authService.getCurrentUser()?.firstName }} {{ authService.getCurrentUser()?.lastName }}</p>
              <p class="user-email">{{ authService.getCurrentUser()?.email }}</p>
            </div>
            <button mat-button class="logout-button" (click)="logout()">
              <i class="fas fa-sign-out-alt"></i>
              <span>Logout</span>
            </button>
          </div>
        </div>
      </ng-container>
      
      <button mat-icon-button class="cart-button" routerLink="/cart">
        <i class="fas fa-shopping-cart"></i>
        <span class="cart-badge" *ngIf="cartItemCount > 0">{{ cartItemCount }}</span>
      </button>
    </div>
  </div>
</nav>
